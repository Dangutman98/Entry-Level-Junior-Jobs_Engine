<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת איתור משרות - בוגרי מדמ"ח (כל התחומים)</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #10b981;
            --accent-secondary: #3b82f6;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            animation: fadeInDown 0.8s ease-out;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #34d399, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Filter buttons */
        .filters {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(16, 185, 129, 0.2);
            border-color: #34d399;
            color: #6ee7b7;
        }

        .container {
            max-width: 1300px;
            width: 90%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 28px;
        }

        .job-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.6s ease-out both;
        }

        .job-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(16, 185, 129, 0.15);
            border-color: rgba(52, 211, 153, 0.4);
        }

        .job-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .job-card:hover::before {
            opacity: 1;
        }

        .company-name {
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            color: #6ee7b7;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            letter-spacing: 0;
            font-weight: 600;
        }

        .job-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 16px 0;
            line-height: 1.3;
            color: #ffffff;
        }

        .job-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .meta-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
        }

        .tech-pill {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .job-card:hover .tech-pill {
            background: rgba(16, 185, 129, 0.1);
            color: #a7f3d0;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .apply-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            border: none;
            cursor: pointer;
        }

        .apply-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .status {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <header>
        <h1>כניסה לשוק ההייטק 🚀</h1>
        <div class="filters">
            <button class="filter-btn active" onclick="filterJobs('All')">הכל</button>
            <button class="filter-btn" style="border-color: #3b82f6; color: #60a5fa;" onclick="filterJobs('NewToday')">🆕 משרות מהיום</button>
            <button class="filter-btn" onclick="filterJobs('Backend')">Backend</button>
            <button class="filter-btn" onclick="filterJobs('Frontend')">Frontend / Fullstack</button>
            <button class="filter-btn" onclick="filterJobs('DevOps')">DevOps / Cloud</button>
            <button class="filter-btn" onclick="filterJobs('Data')">Data / AI</button>
            <button class="filter-btn" onclick="filterJobs('QA')">QA / Automation</button>
            <button class="filter-btn" onclick="filterJobs('Cyber')">Cyber Security</button>
        </div>
    </header>

    <div class="container" id="jobs-container">
        <!-- Job Cards injected via JS -->
    </div>

    <script>

];
        const colorMap = {
            'Backend': { bg: 'rgba(59, 130, 246, 0.15)', color: '#93c5fd' },
            'Frontend': { bg: 'rgba(245, 158, 11, 0.15)', color: '#fcd34d' },
            'DevOps': { bg: 'rgba(16, 185, 129, 0.15)', color: '#6ee7b7' },
            'Data': { bg: 'rgba(236, 72, 153, 0.15)', color: '#f9a8d4' },
            'QA': { bg: 'rgba(139, 92, 246, 0.15)', color: '#c4b5fd' },
            'Cyber': { bg: 'rgba(239, 68, 68, 0.15)', color: '#fca5a5' }
        };

        const jobs = window.jobsData || [];

        function renderJobs(filterCategory = 'All') {
            const container = document.getElementById('jobs-container');
            container.innerHTML = '';
            
            let delay = 0.1;
            
            jobs.forEach(job => {
                if (filterCategory === 'NewToday') {
                    const today = new Date().toISOString().split('T')[0];
                    if (job.dateFound !== today) return;
                } else if (filterCategory !== 'All' && job.category !== filterCategory) {
                    return;
                }

                const card = document.createElement('div');
                card.className = 'job-card';
                card.style.animationDelay = `${delay}s`;
                delay += 0.1;
                
                const techPills = job.techStack.map(tech => `<span class="tech-pill">${tech}</span>`).join('');
                
                const appliedJobs = JSON.parse(localStorage.getItem('appliedJobs') || '{}');
                const isApplied = appliedJobs[job.link];
                const colors = colorMap[job.category] || { bg: '#333', color: '#fff' };

                card.innerHTML = `
                    <div class="company-name">
                        ${job.company}
                        <span class="badge" style="background: ${colors.bg}; color: ${colors.color};">${job.category}</span>
                    </div>
                    <h2 class="job-title">${job.title}</h2>
                    <div class="job-meta">
                        <div class="meta-tag">📍 ${job.location}</div>
                        <div class="meta-tag">🎓 ${job.type}</div>
                    </div>
                    <div class="tech-stack">
                        ${techPills}
                    </div>
                    <div class="card-footer">
                        <div class="status">
                            <div class="status-dot"></div>
                            ${job.status}
                        </div>
                        
                        <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;">
                            <button onclick="toggleApplied(this, event)" data-url="${job.link}" class="apply-btn" style="background: ${isApplied ? '#10b981' : '#374151'}; color: white; border: none; cursor: pointer;">
                                ${isApplied ? '✅ הגשתי!' : 'סימון כהוגש'}
                            </button>
                            <a href="${job.link}" target="_blank" class="apply-btn">צפה והגש</a>
                        </div>

                    </div>
                `;
                container.appendChild(card);
            });
        }

        
        function toggleApplied(btn, event) {
            if(event) event.preventDefault();
            const url = btn.getAttribute('data-url');
            let appliedJobs = JSON.parse(localStorage.getItem('appliedJobs') || '{}');
            if (appliedJobs[url]) {
                delete appliedJobs[url];
            } else {
                appliedJobs[url] = true;
            }
            localStorage.setItem('appliedJobs', JSON.stringify(appliedJobs));
            renderJobs(document.querySelector('.filter-btn.active').textContent.trim());
        }

        function filterJobs(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderJobs(category);
        }

        // Initial render
        renderJobs('All');
    </script>
</body>
</html>
